# Overrides applied AFTER minimal-tmux-status theme is sourced.
# Top-left shows the session name + the session's main working directory.
#
# Center the window list across the FULL bar, not just the gap between
# status-left/right — otherwise a wide status-left shoves the tabs right.
set -g status-justify absolute-centre
#
# @root is the session's main working directory: a per-session option set on
# creation (session-created hook) and updated when you re-anchor with
# `prefix + z`. Falls back to the active pane's live cwd until it's set.
# (#{session_path} is unreliable here — it resolves globally, not per-session.)
set -g status-left-length 80
set -g status-left "#[fg=#7aa2f7,bold]#S #[fg=#56608A]#{?@root,#{s|#{HOME}|~|:@root},#{s|#{HOME}|~|:pane_current_path}} "

# ── Claude status dots ───────────────────────────────────────────────────────
# Three states, set by scripts/claude-status.sh from Claude Code hooks:
#   done    #7aa2f7 (blue)  — Claude finished / your turn
#   working #ffffff (white) — Claude actively running
#   idle    #565f89 (gray)  — untouched / nothing happening
# Blue persists until Claude works again (sending a prompt -> white); focusing a
# window does NOT clear it.
set -g window-status-format "#{?#{==:#{@claude_status},done},#[fg=#7aa2f7]● ,#{?#{==:#{@claude_status},working},#[fg=#ffffff]● ,#[fg=#565f89]● }}#[fg=#56608A]#I:#W "
set -g window-status-current-format "#[bg=#{@minimal-tmux-bg}]#{?#{==:#{@claude_status},done},#[fg=#7aa2f7]● ,#{?#{==:#{@claude_status},working},#[fg=#ffffff]● ,#[fg=#565f89]● }}#[fg=#ffffff]#I:#W#{?window_zoomed_flag, 󰊓 , }"

# ── Top-right clock ──────────────────────────────────────────────────────────
# Keep the claude-alert / prefix dot, then append 24-hour (military) time.
set -g status-right-length 50
set -g status-right "#{?@claude_alert,#[fg=colour214] ● ,#{?client_prefix,#[fg=#ffffff] ● ,   }}#[fg=#56608A]%H:%M"

# Clean slate on reload: wipe stale dots (working windows re-mark within seconds).
run-shell "~/.config/tmux/scripts/claude-status.sh reset-all"
