# Overrides applied AFTER minimal-tmux-status theme is sourced.
# Top-left shows the session's main working directory.
#
# Center the window list across the FULL bar, not just the gap between
# status-left/right — otherwise a wide status-left shoves the tabs right.
set -g status-justify absolute-centre
#
# Top-left = the active window's directory label + the git branch of where the
# active pane actually is. These use DIFFERENT directories on purpose:
#
# DIRECTORY label (left), in priority order: @worktree (a per-WINDOW option set
# by claude-worktree-sync.sh when a Claude session enters a .claude/worktrees/
# worktree) -> @root (the session's STABLE project anchor, set on the
# session-created hook and re-anchored by `prefix + w`) -> active pane cwd. It
# stays pinned to the project even as panes wander — that's the point of @root.
# (#{session_path} is unreliable here — it resolves globally, not per-session.)
#
# BRANCH (right) FOLLOWS THE ACTIVE PANE: @worktree (forced — a Claude session's
# own shell sits at the repo root even while Claude works in the worktree, so
# without this the branch would read 'main') -> active pane cwd. So `cd`-ing a
# pane into a worktree (or any repo) shows THAT branch, and a manual
# `git checkout` shows up on its own — git is read live by git-branch.sh via
# #(), re-run every status-interval. NOTE: @root is deliberately NOT in this
# chain, otherwise it would always win over the pane's real location.
# The branch turns purple while the window is following a Claude worktree.
set -g status-interval 5
set -g status-left-length 120
set -g status-left "#[fg=#56608A]#{s|#{HOME}|~|:#{?@worktree,#{@worktree},#{?@root,#{@root},#{pane_current_path}}}} #{?@worktree,#[fg=#bb9af7],#[fg=#56608A]}#(~/.config/tmux/scripts/git-branch.sh \"#{?@worktree,#{@worktree},#{pane_current_path}}\")#[default] "

# ── Claude status dots ───────────────────────────────────────────────────────
# Four states, set by scripts/claude-status.sh from Claude Code hooks:
#   done    #4488F5 (blue)   — Claude finished, you haven't looked yet
#   working #ff9e64 (orange) — Claude actively running
#   seen    #ffffff (white)  — Claude finished and you've viewed the window
#   idle    #565f89 (gray)   — untouched / nothing happening
# Blue persists until you focus the window (pane-focus-in hook flips it to white)
# or Claude works again (-> orange). See claude-status.sh for the transitions.
set -g window-status-format "#{?#{==:#{@claude_status},done},#[fg=#4488F5]● ,#{?#{==:#{@claude_status},working},#[fg=#ff9e64]● ,#{?#{==:#{@claude_status},seen},#[fg=#ffffff]● ,#[fg=#565f89]● }}}#[fg=#56608A]#I:#W "
# #I:#W (number, colon, title) breathes while `prefix m` swap-mode is active:
# swap-blink.sh fades @swap_blink through a white<->#3b4261 gradient frame by
# frame, and we paint the tab with that color. Unset/absent -> solid #ffffff.
set -g window-status-current-format "#[bg=#{@minimal-tmux-bg}]#{?#{==:#{@claude_status},done},#[fg=#4488F5]● ,#{?#{==:#{@claude_status},working},#[fg=#ff9e64]● ,#{?#{==:#{@claude_status},seen},#[fg=#ffffff]● ,#[fg=#565f89]● }}}#{?@swap_blink,#[fg=#{@swap_blink}],#[fg=#ffffff]}#I:#W#{?window_zoomed_flag, 󰊓 , }"

# ── Top-right clock ──────────────────────────────────────────────────────────
# Just the 24-hour (military) time — no status dots.
set -g status-right-length 50
set -g status-right "#[fg=#56608A]%H:%M"

# Clean slate on reload: wipe stale dots (working windows re-mark within seconds).
run-shell "~/.config/tmux/scripts/claude-status.sh reset-all"
