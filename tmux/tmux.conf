set -g default-terminal "tmux-256color"
# Truecolor output to Ghostty so the patched colour_dim() renders accurate
# 24-bit dimmed colors instead of banded 256-color approximations.
set -as terminal-features ",xterm-ghostty:RGB"

# prefix key change.
# We take over C-a entirely (prefix = None) so we can run an action ON the
# prefix press: fire a sonic-boom shader pulse. The root-table C-a binding runs
# prefix-flash.sh, which ramps the cursor COLOR through blaze-amber shades that
# shaders/prefix_flash.glsl detects and bursts a boom from (no cursor shape
# change). Then `switch-client -T prefix` enters the prefix key-table manually
# so the next key is a normal prefix binding.
set -g prefix None
unbind C-b
bind -n C-a run-shell -b "~/.config/tmux/scripts/prefix-flash.sh '#{client_tty}' '#{client_name}'" \; switch-client -T prefix
# C-a C-a still sends a literal Ctrl-A to the app underneath.
bind -T prefix C-a send-keys C-a

# Inactive-pane dimming is handled by the patched tmux binary (~/.local/bin/tmux,
# colour_dim() — see build-dim-tmux.sh). It blends EVERY cell of inactive panes
# toward the bg (hue preserved, just darker), so window-style is no longer
# needed. Tune the strength here: 0 = off, 100 = fully background. Reload with
# prefix+r, or live: tmux set -s dim-inactive-percent N
set -s dim-inactive-percent 45
# Flatten the borders so focus is shown by brightness, not a moving line.
set -g pane-border-style 'fg=colour237'
set -g pane-active-border-style 'fg=colour237'
# better escape responsiveness
set -s escape-time 0
# forward terminal focus events so Neovim's FocusLost/FocusGained fire on
# tmux pane switches (tint.nvim untints nvim so tmux dims the whole pane).
set -g focus-events on
# Force a full client redraw on pane focus change so the patched colour_dim()
# re-applies instantly. tmux caches each pane's grid and won't re-emit an
# inactive pane's cells on its own, so the dim would otherwise lag until the
# pane's content next changes.
set-hook -g pane-focus-in 'refresh-client'
set-hook -g pane-focus-out 'refresh-client'
# Viewing a window with a fresh (blue) "done" dot marks it as seen -> white, so
# the status bar distinguishes Claude results you've looked at from new ones.
# #{window_id} is expanded against the focused pane's window before run-shell.
set-hook -ga pane-focus-in 'run-shell -b "~/.config/tmux/scripts/claude-status.sh seen-if-done #{window_id}"'

# window creation consolidated onto o / O (c, C and N unbound).
#   o = plain terminal window, O = claude code (skip permissions),
# both opened in the SESSION working directory (@root, set by prefix w) rather
# than the focused pane's path, so new windows always start at the project root
# no matter where a pane has wandered. Falls back to the pane path if @root is
# somehow unset.
unbind c
unbind N
bind o new-window -c '#{?@root,#{@root},#{pane_current_path}}'
bind O new-window -c '#{?@root,#{@root},#{pane_current_path}}' 'claude --dangerously-skip-permissions'
bind e new-window -c '#{?@worktree,#{@worktree},#{pane_current_path}}' 'nvim .'

# change horizontal/vertical splits to = and -.
# Splits open in @worktree when the window is following a Claude worktree (set
# by claude-worktree-sync.sh), else the active pane's path. This is how you get
# a shell INSIDE the worktree to run tests / the server: the Claude pane's own
# shell stays at the repo root, but a split lands in the worktree.
# After the split, fire redim-after-split.sh: a full-screen TUI in the now-
# inactive pane (claude, nvim) repaints itself AFTER tmux's post-split redraw,
# landing undimmed, and nothing redraws the pane again until the next focus
# change — which is why manually switching panes "fixes" the dim. The script
# replays that late refresh-client a beat later so colour_dim() re-emits the
# pane dimmed once the TUI has settled. (A simple pane already dims on its own.)
unbind %
unbind =
bind = split-window -h -c '#{?@worktree,#{@worktree},#{pane_current_path}}' \; run-shell -b "~/.config/tmux/scripts/redim-after-split.sh '#{client_name}'"

# change vertical split to -
unbind '"'
bind - split-window -v -c '#{?@worktree,#{@worktree},#{pane_current_path}}' \; run-shell -b "~/.config/tmux/scripts/redim-after-split.sh '#{client_name}'"

# + and _ : same splits as = and -, but launch claude code in the new pane.
# Same redim-after-split.sh fix so the now-inactive pane dims (see = / - above).
bind + split-window -h -c '#{?@worktree,#{@worktree},#{pane_current_path}}' 'claude --dangerously-skip-permissions' \; run-shell -b "~/.config/tmux/scripts/redim-after-split.sh '#{client_name}'"
bind _ split-window -v -c '#{?@worktree,#{@worktree},#{pane_current_path}}' 'claude --dangerously-skip-permissions' \; run-shell -b "~/.config/tmux/scripts/redim-after-split.sh '#{client_name}'"

# kill the pane immediately, no "kill-pane? (y/n)" confirmation.
bind x kill-pane

# review what Claude changed in a centered floating popup running diffview.nvim.
# No -x/-y: display-popup centers by default (matching the `s` sessionizer above).
# d (lower)   = EXCLUSIVELY what THIS Claude session changed ("no changes" if none).
# D (capital) = the whole branch (every uncommitted change in the repo).
unbind d
bind d display-popup -E -w 90% -h 85% -d '#{?@worktree,#{@worktree},#{pane_current_path}}' -b rounded "~/.config/tmux/scripts/claude-diff.sh '#{pane_id}' session"

# D overrides nothing important; shows the full branch diff.
unbind D
bind D display-popup -E -w 90% -h 85% -d '#{?@worktree,#{@worktree},#{pane_current_path}}' -b rounded "~/.config/tmux/scripts/claude-diff.sh '#{pane_id}' branch"

# w: changes tmux session directory (and updates the status-bar @root marker).
# run-shell is needed so #{pane_current_path} expands before tmux set sees it.
unbind z
bind w attach-session -t . -c '#{pane_current_path}' \; run-shell 'tmux set -t "#{session_name}" @root "#{pane_current_path}"'

# Give every session a "main working directory" (@root) at creation time,
# captured from where the first pane starts. Shown in the top-left status.
set-hook -g session-created 'run-shell "tmux set -t \"#{hook_session_name}\" @root \"#{pane_current_path}\""'

# R = reload config; r = rotate the current window 90 degrees clockwise
# (repeatable). rotate-layout.sh owns both the content rotation and the split
# orientation so two panes cycle through all four rotational states, not two.
bind R source-file ~/.tmux.conf
bind -r r run-shell "~/.config/tmux/scripts/rotate-layout.sh '#{window_id}'"
# install new packages using prefix + I
# source using prefix + r

# resizing panels
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
set -g mouse on

# allows clearing screen after prefix
bind C-l send-keys 'C-l'


# allow vim mode keys in tmux
unbind v
bind v copy-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection  # visual mode selection
bind-key -T copy-mode-vi 'y' send -X copy-selection   # yank for copy

# prefix + S: make a brand-new project — type a name, pick a root (work/dev/…),
# and it mkdirs the dir then hands off to the sessionizer to create + switch to
# a session for it. See scripts/tmux-new-project.sh. (`s` switches to existing.)
bind-key S display-popup -E -w 45% -h 70% -b rounded "~/.config/tmux/scripts/tmux-new-project.sh"
unbind C

# tmux-sessionizer: fzf over live sessions + project dirs, then switch/create.
# Replaces the default choose-tree on `prefix + s`; also on `prefix + f`.
# See scripts/tmux-sessionizer.sh.
bind-key s display-popup -E -w 45% -h 70% -b rounded "~/.config/tmux/scripts/tmux-sessionizer.sh"

# tmux-file-finder: fzf over files under the session root (@root, set by
# prefix w), open pick in nvim. File-level sibling of the sessionizer. Falls
# back to the pane path if @root is unset. See scripts/tmux-file-finder.sh.
bind-key E display-popup -E -w 70% -h 70% -b rounded -d '#{?@root,#{@root},#{pane_current_path}}' "~/.config/tmux/scripts/tmux-file-finder.sh"

# f = full-screen the active pane (zoom toggle). (Was a duplicate sessionizer
# binding; s still opens the sessionizer.)
bind-key f resize-pane -Z

# ? = rounded popup cheatsheet of the custom shortcuts (closes on any key).
unbind ?
bind-key ? display-popup -E -w 40 -h 32 -b rounded "~/.config/tmux/scripts/cheatsheet.sh"

unbind -T copy-mode-vi MouseDragEnd1Pane

# prefix m ("move"), then a digit: instantly swap the current window with that
# index. Uses a key-table so nothing pops up in the status bar. Any non-digit
# key cancels (returns to the root table with no action).
# swap-blink.sh blinks the current tab (#I:#W) the whole time the swapwin table
# is active, as a "you're in move mode, pick a number" cue; it stops the instant
# you press the next key (digit -> swap, anything else -> cancel). switch-client
# first so the table is already swapwin when the script starts polling.
bind m switch-client -T swapwin \; run-shell -b "~/.config/tmux/scripts/swap-blink.sh '#{client_name}' '#{window_id}'"
bind -T swapwin 1 swap-window -t :1
bind -T swapwin 2 swap-window -t :2
bind -T swapwin 3 swap-window -t :3
bind -T swapwin 4 swap-window -t :4
bind -T swapwin 5 swap-window -t :5
bind -T swapwin 6 swap-window -t :6
bind -T swapwin 7 swap-window -t :7
bind -T swapwin 8 swap-window -t :8
bind -T swapwin 9 swap-window -t :9

# prefix M ("merge"), then a digit: join the current pane into that window
# (join-pane -h -> side by side, matching the `=` split). The source window
# closes when its last pane leaves, so single-pane windows merge whole; in a
# multi-pane window only the active pane moves. Sibling of `prefix m` (swap):
# same key-table pattern, same blink cue, but swap-blink.sh breathes toward a
# distinct color (#41a6b5 cyan) so merge mode reads differently from swap.
bind M switch-client -T mergewin \; run-shell -b "~/.config/tmux/scripts/swap-blink.sh '#{client_name}' '#{window_id}' mergewin '#41a6b5'"
bind -T mergewin 1 join-pane -h -t :1
bind -T mergewin 2 join-pane -h -t :2
bind -T mergewin 3 join-pane -h -t :3
bind -T mergewin 4 join-pane -h -t :4
bind -T mergewin 5 join-pane -h -t :5
bind -T mergewin 6 join-pane -h -t :6
bind -T mergewin 7 join-pane -h -t :7
bind -T mergewin 8 join-pane -h -t :8
bind -T mergewin 9 join-pane -h -t :9

#reorder windows
set-option -g renumber-windows on
#start windows at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1


# plugin manager
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'  # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'  # automatically saves session for you every 15 minutes
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# themes
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @minimal-tmux-bg "none"

set -g window-status-style fg=#56608A
set status-bg default
# break the current pane out into its own window (same as prefix !)
bind-key b break-pane


# initialize plugin manager (make sure this is at the end of the file)
run -b '~/.tmux/plugins/tpm/tpm'

# re-apply overrides after tpm loads plugins
run-shell 'sleep 0.5 && tmux source-file ~/.tmux/plugins/minimal-tmux-status/theme/minimal-status.tmux && tmux source-file ~/.config/tmux/status-overrides.conf'

