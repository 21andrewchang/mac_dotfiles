set -g default-terminal "tmux-256color"
# Truecolor output to Ghostty so the patched colour_dim() renders accurate
# 24-bit dimmed colors instead of banded 256-color approximations.
set -as terminal-features ",xterm-ghostty:RGB"

# prefix key change
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Inactive-pane dimming is handled by the patched tmux binary (~/.local/bin/tmux,
# colour_dim() — see build-dim-tmux.sh). It blends EVERY cell of inactive panes
# toward the bg (hue preserved, just darker), so window-style is no longer
# needed. Tune the strength here: 0 = off, 100 = fully background. Reload with
# prefix+r, or live: tmux set -s dim-inactive-percent N
set -s dim-inactive-percent 45
# Flatten the borders so focus is shown by brightness, not a moving line.
set -g pane-border-style 'fg=colour237'
set -g pane-active-border-style 'fg=colour237'
# better escape responsiveness
set -s escape-time 0
# forward terminal focus events so Neovim's FocusLost/FocusGained fire on
# tmux pane switches (tint.nvim untints nvim so tmux dims the whole pane).
set -g focus-events on
# Force a full client redraw on pane focus change so the patched colour_dim()
# re-applies instantly. tmux caches each pane's grid and won't re-emit an
# inactive pane's cells on its own, so the dim would otherwise lag until the
# pane's content next changes.
set-hook -g pane-focus-in 'refresh-client'
set-hook -g pane-focus-out 'refresh-client'

# plain new window in the current path
bind c new-window -c '#{pane_current_path}'

# new window running claude code (skip permissions) in the current path
bind N new-window -c '#{pane_current_path}' 'claude --dangerously-skip-permissions'

# change horizontal split to =
unbind %
unbind =
bind = split-window -h -c '#{pane_current_path}'

# change vertical split to -
unbind '"'
bind - split-window -v -c '#{pane_current_path}'

# review what THIS Claude instance changed (per-pane tracked files) in a
# diffview.nvim split on the right (full height, 70% wide)
bind D split-window -fh -l 70% -c '#{pane_current_path}' "~/.config/tmux/scripts/claude-diff.sh '#{pane_id}'"

# changes tmux session directory (and updates the status-bar @root marker).
# run-shell is needed so #{pane_current_path} expands before tmux set sees it.
unbind z
bind z attach-session -t . -c '#{pane_current_path}' \; run-shell 'tmux set -t "#{session_name}" @root "#{pane_current_path}"'

# Give every session a "main working directory" (@root) at creation time,
# captured from where the first pane starts. Shown in the top-left status.
set-hook -g session-created 'run-shell "tmux set -t \"#{hook_session_name}\" @root \"#{pane_current_path}\""'

# sourcing config file
bind r source-file ~/.tmux.conf
# install new packages using prefix + I
# source using prefix + r

# resizing panels
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z
set -g mouse on

# allows clearing screen after prefix
bind C-l send-keys 'C-l'


# allow vim mode keys in tmux
unbind v
bind v copy-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection  # visual mode selection
bind-key -T copy-mode-vi 'y' send -X copy-selection   # yank for copy

bind-key S command-prompt -p "Enter session name:" "new-session -s '%%'"
bind-key C command-prompt -p "Enter window name:" "new-window -n '%%'"

# tmux-sessionizer: fzf over live sessions + project dirs, then switch/create.
# Replaces the default choose-tree on `prefix + s`; also on `prefix + f`.
# See scripts/tmux-sessionizer.sh.
bind-key s display-popup -E -w 70% -h 70% "~/.config/tmux/scripts/tmux-sessionizer.sh"
bind-key f display-popup -E -w 70% -h 70% "~/.config/tmux/scripts/tmux-sessionizer.sh"

# YouTube in a pane (sixel graphics through tmux)
set -g allow-passthrough on
set -as terminal-features 'xterm*:sixel'
bind-key Y split-window -h -c '#{pane_current_path}' "yt-search"
bind-key u command-prompt -p "YouTube URL:" "split-window -h -c '#{pane_current_path}' 'mpv --vo=tct --really-quiet \"%%\"'"

unbind -T copy-mode-vi MouseDragEnd1Pane

# swap current window index with prompted number
bind w command-prompt -p "Swap with window:" "swap-window -t '%%'"

#reorder windows
set-option -g renumber-windows on
#start windows at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1


# plugin manager
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'  # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'  # automatically saves session for you every 15 minutes
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# themes
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @minimal-tmux-bg "none"

set -g window-status-style fg=#56608A
set status-bg default
# toggle tmux status bar at the bottom
bind-key b set-option status


# initialize plugin manager (make sure this is at the end of the file)
run -b '~/.tmux/plugins/tpm/tpm'

# re-apply overrides after tpm loads plugins
run-shell 'sleep 0.5 && tmux source-file ~/.tmux/plugins/minimal-tmux-status/theme/minimal-status.tmux && tmux source-file ~/.config/tmux/status-overrides.conf'

